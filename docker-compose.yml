version: '3'

services:
  website:
    image: node:16
    restart: always
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    command: >
      bash -c "npm install && node server.js"
    environment:
      - PORT=3000
      - GOOGLE_SHEET_ID=1vOfTLk14C0G9Dz1rTTJIpEe1XB9eDRRv65fnYVQrLWw
      - GOOGLE_SHEET_RANGE='AI Cold Call'!A:Z
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_WEBHOOK_PATH=${N8N_WEBHOOK_PATH}
      - N8N_API_KEY=${N8N_API_KEY}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
